services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/diorisso/hatsu-api:${TAG:-latest}
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__HatsuContext: "Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      Cors__AllowedOrigins: ${FRONTEND_ORIGIN:-}
      Jwt__Key: ${JWT_KEY:?set JWT_KEY in .env}
      Jwt__Issuer: ${JWT_ISSUER:-Hatsu}
      Jwt__Audience: ${JWT_AUDIENCE:-HatsuClient}
      Igdb__ClientId: ${IGDB_CLIENT_ID:?set IGDB_CLIENT_ID in .env}
      Igdb__ClientSecret: ${IGDB_CLIENT_SECRET:?set IGDB_CLIENT_SECRET in .env}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
